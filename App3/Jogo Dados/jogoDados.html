<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.css" />
    <title>Document</title>
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4 text-center">Jogo dos Dados</h1>

                        <div class="row align-items-center g-3 mb-4">
                            <div class="col-12 col-md-3 text-center">
                                <img src="Dados/3.png" id="img1" alt="Dado esquerdo" class="img-fluid" />
                            </div>

                            <div class="col-12 col-md-6">
                                <div class="mb-3">
                                    <label for="txtjogador" class="form-label">Jogador</label>
                                    <input type="text" id="txtjogador" class="form-control" />
                                </div>
                                <div>
                                    <label for="txtmontante" class="form-label">Montante</label>
                                    <input type="text" id="txtmontante" class="form-control" />
                                </div>
                            </div>

                            <div class="col-12 col-md-3 text-center">
                                <img src="Dados/5.png" id="img2" alt="Dado direito" class="img-fluid" />
                            </div>
                        </div>

                        <div class="d-grid d-md-flex justify-content-md-center gap-2">
                            <button id="bt" class="btn btn-primary px-4">Jogar</button>
                        </div>

                        <div id="tv" class="alert alert-secondary mt-4 mb-0" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="jogoDados.js"></script>
    <script>
        window.onload = function(){
            document.addEventListener('oniguais', (evt)=>{
                evt.preventDefault();
                let premio =evt.detail.sender.Dados[0] * 2 * evt.detail.aposta;
                evt.detail.sender.Montante += premio;
                const tv = document.getElementById('tv');
                tv.innerText = `Parabéns ${evt.detail.sender.Jogador}! Você ganhou ${premio.toFixed(2)}€!`;
            });
            let ze = new JogoDados('Zé Carioca', 2000);
            console.log(ze);
            ze.ver();

            const bt = document.getElementById('bt');
            bt.addEventListener('click', (evt)=>{
                evt.preventDefault();
                ze.jogar(100);
            });
        }
    </script>
</body>
</html>
